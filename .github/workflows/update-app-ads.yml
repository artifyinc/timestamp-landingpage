name: Update app-ads.txt

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-app-ads:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download app-ads.txt from daro.so
        run: curl -f --max-filesize 524288 -o public/app-ads.txt https://publisher.daro.so/app-ads.txt

      - name: Append app-ads.google.txt
        run: cat app-ads.google.txt >> public/app-ads.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add public/app-ads.txt
            git commit -m "Update app-ads.txt from daro.so"
            git push
          else
            echo "No changes to commit"
          fi
